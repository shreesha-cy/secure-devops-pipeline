name: Secure DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sonarqube:
        image: sonarqube:latest
        ports:
          - 9000:9000

    steps:
      # 📥 CHECKOUT
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 GITLEAKS
      - name: Run Gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v $PWD:/repo zricethezav/gitleaks:latest detect \
          --source=/repo \
          --no-git \
          --exit-code 1

      # 🔐 TRUFFLEHOG
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm -v $PWD:/repo ghcr.io/trufflesecurity/trufflehog:latest \
          filesystem /repo --fail --no-update

      # ☕ JAVA
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 📦 BUILD
      - name: Build JAR
        run: |
          cd app
          mvn clean install -DskipTests -Dcheckstyle.skip=true -Dspring-javaformat.skip=true

      # 🐳 DOCKER LOGIN
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 BUILD IMAGE
      - name: Build Docker Image
        run: docker build -t shreesha369/devops-app -f docker/Dockerfile .

      # 🐳 PUSH IMAGE
      - name: Push Docker Image
        run: docker push shreesha369/devops-app

      # 🛡️ TRIVY SCAN
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shreesha369/devops-app
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # ⏳ WAIT FOR SONARQUBE
      - name: Wait for SonarQube
        run: |
          echo "Waiting for SonarQube..."
          for i in {1..60}; do
            STATUS=$(curl -s http://localhost:9000/api/system/status || echo "DOWN")

            if [[ "$STATUS" == *"UP"* ]]; then
              echo "SonarQube is ready!"
              break
            fi

            echo "Still starting..."
            sleep 5
          done

      # 📦 INSTALL jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🔐 GENERATE SONAR TOKEN
      - name: Generate Sonar Token
        env:
          SONAR_USER: admin
          SONAR_PASS: admin
        run: |
          TOKEN=$(curl -s -u $SONAR_USER:$SONAR_PASS \
          -X POST "http://localhost:9000/api/user_tokens/generate?name=ci-token" \
          | jq -r '.token')

          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV

      # 🔍 SONAR SCAN
      - name: SonarQube Scan
        run: |
          cd app
          mvn sonar:sonar \
            -Dsonar.projectKey=secure-devops \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=$SONAR_TOKEN

      # ✅ QUALITY GATE
      - name: Check SonarQube Quality Gate
        continue-on-error: true
        env:
          SONAR_USER: admin
          SONAR_PASS: admin
        run: |
          echo "Checking Quality Gate..."
          sleep 20

          STATUS=$(curl -s -u $SONAR_USER:$SONAR_PASS \
          "http://localhost:9000/api/qualitygates/project_status?projectKey=secure-devops" \
          | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            echo "❌ Quality Gate Failed"
          else
            echo "✅ Quality Gate Passed"
          fi

      # 🛡️ OWASP DEPENDENCY CHECK
      - name: OWASP Dependency Check
        run: |
          cd app
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -Dformat=HTML \
            -DfailBuildOnCVSS=7 \
            -DskipProvidedScope=true
