name: Secure DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    # 🔧 SELF-HOSTED RUNNER for localhost access
    # If using GitHub-hosted runner, change this to: runs-on: ubuntu-latest
    # For DefectDojo on localhost:8000, must use self-hosted runner
    runs-on: self-hosted

    services:
      # ⚠️ NOTE: Services only work with ubuntu-latest runners
      # For self-hosted runners, start SonarQube separately on your host
      sonarqube:
        image: sonarqube:latest
        ports:
          - 9000:9000

    steps:
      # 📥 CHECKOUT
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 GITLEAKS
      - name: Run Gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v $PWD:/repo zricethezav/gitleaks:latest detect \
          --source=/repo \
          --no-git \
          --exit-code 1
      # 🔐 TRUFFLEHOG
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm -v $PWD:/repo ghcr.io/trufflesecurity/trufflehog:latest \
          filesystem /repo --fail --no-update
      # ☕ JAVA
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 📦 BUILD
      - name: Build JAR
        run: |
          cd app
          mvn clean install -DskipTests -Dcheckstyle.skip=true -Dspring-javaformat.skip=true
      # 🐳 DOCKER LOGIN
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 BUILD IMAGE
      - name: Build Docker Image
        run: docker build -t anoop1605/devops-app -f docker/Dockerfile .

      # 🐳 PUSH IMAGE
      - name: Push Docker Image
        run: docker push anoop1605/devops-app

      # 🛡️ TRIVY SCAN (UPDATED → JSON + non-blocking)
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: anoop1605/devops-app
          format: json
          output: trivy-report.json
          exit-code: 0
          severity: CRITICAL,HIGH

      # ⏳ WAIT FOR SONARQUBE
      - name: Wait for SonarQube
        run: |
          echo "Waiting for SonarQube..."
          for i in {1..60}; do
            STATUS=$(curl -s http://localhost:9000/api/system/status || echo "DOWN")
            if [[ "$STATUS" == *"UP"* ]]; then
              echo "SonarQube is ready!"
              break
            fi
            echo "Still starting..."
            sleep 5
          done
      # 📦 INSTALL jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🔐 GENERATE SONAR TOKEN
      - name: Generate Sonar Token
        env:
          SONAR_USER: admin
          SONAR_PASS: admin
        run: |
          TOKEN=$(curl -s -u $SONAR_USER:$SONAR_PASS \
          -X POST "http://localhost:9000/api/user_tokens/generate?name=ci-token" \
          | jq -r '.token')
          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV
      # 🔍 SONAR SCAN
      - name: SonarQube Scan
        run: |
          cd app
          mvn sonar:sonar \
            -Dsonar.projectKey=secure-devops \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=$SONAR_TOKEN
      # ✅ QUALITY GATE
      - name: Check SonarQube Quality Gate
        continue-on-error: true
        env:
          SONAR_USER: admin
          SONAR_PASS: admin
        run: |
          echo "Checking Quality Gate..."
          sleep 20
          STATUS=$(curl -s -u $SONAR_USER:$SONAR_PASS \
          "http://localhost:9000/api/qualitygates/project_status?projectKey=secure-devops" \
          | jq -r '.projectStatus.status')
          echo "Quality Gate Status: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "❌ Quality Gate Failed"
          else
            echo "✅ Quality Gate Passed"
          fi
      # 🛡️ OWASP DEPENDENCY CHECK (UPDATED → XML)
      - name: OWASP Dependency Check
        run: |
          cd app
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -Dformat=XML \
            -DfailBuildOnCVSS=11 \
            -DskipProvidedScope=true
      # 🛡️ CHECKOV SCAN
      - name: Run Checkov Scan
        continue-on-error: true
        run: |
          docker run --rm -v $PWD:/app bridgecrewio/checkov:latest \
            --framework kubernetes,dockerfile,github_actions \
            --directory /app \
            --output cli \
            --output json \
            --output-file-path console,checkov-report.json
      - name: 🛡️ Upload Security Findings to DefectDojo
        if: always()
        # 📌 REQUIRES SECRETS: DEFECTDOJO_URL (with http:// prefix) and DEFECTDOJO_API_KEY
        # Example: DEFECTDOJO_URL = http://localhost:8000 (for self-hosted runner)
        # For GitHub-hosted runner, use host LAN IP: http://192.168.x.x:8000 or http://172.17.0.1:8000
        run: |
          chmod +x ./scripts/defectdojo-upload.sh
          ./scripts/defectdojo-upload.sh \
            --url "${{ secrets.DEFECTDOJO_URL }}" \
            --api-key "${{ secrets.DEFECTDOJO_API_KEY }}" \
            --product "Secure DevOps Pipeline" \
            --engagement "Scan - ${{ github.run_id }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_PASSWORD }}