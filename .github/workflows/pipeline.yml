name: Secure DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    # 🔧 SELF-HOSTED RUNNER for localhost access
    # If using GitHub-hosted runner, change this to: runs-on: ubuntu-latest
    # For DefectDojo on localhost:8000, must use self-hosted runner
    runs-on: self-hosted
    #runs-on: ubuntu-latest

    steps:
      # 📥 CHECKOUT
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 GITLEAKS
      - name: Run Gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v $PWD:/repo zricethezav/gitleaks:latest detect \
          --source=/repo \
          --no-git \
          --exit-code 1
      # 🔐 TRUFFLEHOG
      - name: Run TruffleHog
        continue-on-error: true
        run: |
          docker run --rm -v $PWD:/repo ghcr.io/trufflesecurity/trufflehog:latest \
          filesystem /repo --fail --no-update
      # ☕ JAVA
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 📦 BUILD
      - name: Build JAR
        run: |
          cd app
          mvn clean install -DskipTests -Dcheckstyle.skip=true -Dspring-javaformat.skip=true
      # 🐳 DOCKER LOGIN
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 BUILD IMAGE
      - name: Build Docker Image
        run: docker build -t anoop1605/devops-app -f docker/Dockerfile .

      # 🐳 PUSH IMAGE
      - name: Push Docker Image
        run: docker push anoop1605/devops-app

      # 💾 CACHE TRIVY DB (Prevents downloading the vulnerability database every time)
      - name: Cache Trivy Database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-trivy-

      # ️ TRIVY SCAN (UPDATED → JSON + non-blocking)
      - name: Scan Docker Image with Trivy
        run: |
          trivy image \
            --format json \
            --output trivy-report.json \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --vuln-type os,library \
            --scanners vuln \
            --skip-dirs /var/log,/tmp,/var/cache \
            --timeout 30m \
            anoop1605/devops-app

      # ⏳ WAIT FOR SONARQUBE
      - name: Wait for SonarQube
        run: |
          echo "Waiting for SonarQube..."
          READY=false
          MAX_ATTEMPTS=120
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if curl -s http://127.0.0.1:9000/api/system/status | grep -q "UP"; then
              echo "✅ SonarQube is ready!"
              READY=true
              break
            fi
            echo "Still starting... (Attempt $i/$MAX_ATTEMPTS)"
            sleep 5
          done
          if [ "$READY" = false ]; then
            echo "❌ SonarQube failed to start in time!"
            echo "Debugging: Checking Docker containers..."
            docker ps -a
            docker logs sonarqube 2>&1 | tail -20
            exit 1
          fi
      # 📦 INSTALL jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      #  SONAR SCAN
      - name: SonarQube Scan
        run: |
          cd app
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.projectKey=secure-devops \
            -Dsonar.host.url=http://127.0.0.1:9000 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
      # ✅ QUALITY GATE
      - name: Check SonarQube Quality Gate
        continue-on-error: true
        run: |
          echo "Checking Quality Gate..."
          sleep 20
          STATUS=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: \
          "http://127.0.0.1:9000/api/qualitygates/project_status?projectKey=secure-devops" \
          | jq -r '.projectStatus.status')
          echo "Quality Gate Status: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "❌ Quality Gate Failed"
          else
            echo "✅ Quality Gate Passed"
          fi

      # ️ OWASP DEPENDENCY CHECK (Using persistent local storage)
      - name: OWASP Dependency Check
        run: |
          cd app
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -Dformat=XML \
            -DfailBuildOnCVSS=11 \
            -DskipProvidedScope=true \
            -DdataDirectory="$HOME/odc-data"
      # 🛡️ CHECKOV SCAN
      - name: Run Checkov Scan
        continue-on-error: true
        run: |
          docker run --rm -v $PWD:/app bridgecrewio/checkov:latest \
            --framework kubernetes,dockerfile,github_actions \
            --directory /app \
            --output cli \
            --output json \
            --output-file-path console,checkov-report.json
      - name: 🛡️ Upload Security Findings to DefectDojo
        if: always()
        # 📌 REQUIRES SECRETS: DEFECTDOJO_URL (with http:// prefix) and DEFECTDOJO_API_KEY
        # Example: DEFECTDOJO_URL = http://localhost:8000 (for self-hosted runner)
        # For GitHub-hosted runner, use host LAN IP: http://192.168.x.x:8000 or http://172.17.0.1:8000
        run: |
          chmod +x ./scripts/defectdojo-upload.sh
          ./scripts/defectdojo-upload.sh \
            --url "${{ secrets.DEFECTDOJO_URL }}" \
            --api-key "${{ secrets.DEFECTDOJO_API_KEY }}" \
            --product "Secure DevOps Pipeline" \
            --engagement "Scan - ${{ github.run_id }}"

      - name: 📊 Push Metrics to Prometheus Pushgateway
        if: always()
        continue-on-error: true
        run: |
          chmod +x ./scripts/prometheus-metrics.sh
          ./scripts/prometheus-metrics.sh \
            --pushgateway "${{ secrets.PUSHGATEWAY_URL }}" \
            --job "secure_devops_pipeline"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_PASSWORD }}