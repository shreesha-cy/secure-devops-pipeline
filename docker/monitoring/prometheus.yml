global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

     # 📤 Prometheus Pushgateway (receives metrics from CI/CD pipeline)

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
    scrape_interval: 10s

  # 🍃 Spring Boot Application (if running on host machine)
  # - job_name: 'spring-actuator'
  #   metrics_path: '/actuator/prometheus'
  #   static_configs:
  #     - targets: ['host.docker.internal:8080']
  #   scrape_interval: 30s
  #   scrape_timeout: 10s

  
  # NOTE: DefectDojo metrics endpoint is not enabled by default
  # To use DefectDojo metrics, configure environment variable: DD_ENABLE_PROMETHEUS_EXPORT=True
  # For now, we focus on pipeline metrics and Spring Boot metrics

  - job_name: 'defectdojo'
    static_configs:
      - targets: ['defectdojo:8000']
    scrape_interval: 30s
